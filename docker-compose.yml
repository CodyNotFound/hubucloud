version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hubucloud-db
    environment:
      POSTGRES_USER: hubucloud
      POSTGRES_PASSWORD: hubucloud123
      POSTGRES_DB: hubucloud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: